.portfolio-buttons{
text-align:center;
margin-top:30px;

.pf-btn{
background-color:#007bff;
color:white;
padding:14px 28px;
margin:10px;

border-radius:8px;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.pf-btn:hover{
background-color:#0056b3;
transform:scale(1.08);
}

.image-preview{
text-align:center;
margin-top:40px;
}

.image-preview img{
width:50%;
max-width:500px;
border-radius:10px;

}
