<!DOCTYPE html>
<html>
<head>
<title>Virtual Solar System Explorer</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

/* Twinkling stars */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:stars 60s linear infinite;
z-index:-1;
}

@keyframes stars{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

h1{
margin-top:20px;
}

/* Solar system container */

.solar-system{
position:relative;
width:800px;
height:800px;
margin:auto;
}

/* Sun */

.sun{
position:absolute;
top:50%;
left:50%;
width:130px;
transform:translate(-50%,-50%);
border-radius:50%;
}

/* Orbit circles */

.orbit{
position:absolute;
border:1px dashed rgba(255,255,255,0.2);
border-radius:50%;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

/* Planet */

.planet{
position:absolute;
top:50%;
left:50%;
transform-origin:0 0;
animation:spin linear infinite;
}

/* Hover zoom */

.planet img:hover{
transform:scale(1.4);
transition:0.3s;
}

/* Tooltip */

.tooltip{
position:absolute;
background:black;
padding:5px 10px;
border-radius:5px;
font-size:12px;
display:none;
white-space:nowrap;
}

.planet:hover .tooltip{
display:block;
top:-25px;
left:20px;
}

/* Orbit sizes */

.mercury-orbit{width:150px;height:150px;}
.venus-orbit{width:200px;height:200px;}
.earth-orbit{width:260px;height:260px;}
.mars-orbit{width:320px;height:320px;}
.jupiter-orbit{width:420px;height:420px;}
.saturn-orbit{width:520px;height:520px;}
.uranus-orbit{width:620px;height:620px;}
.neptune-orbit{width:720px;height:720px;}

/* Planet speeds */

.mercury{animation-duration:6s;}
.venus{animation-duration:8s;}
.earth{animation-duration:10s;}
.mars{animation-duration:12s;}
.jupiter{animation-duration:18s;}
.saturn{animation-duration:22s;}
.uranus{animation-duration:26s;}
.neptune{animation-duration:30s;}

@keyframes spin{
from{transform:rotate(0deg) translateX(75px) rotate(0deg);}
to{transform:rotate(360deg) translateX(75px) rotate(-360deg);}
}

/* Spaceship */

.spaceship{
position:absolute;
top:20%;
left:-100px;
width:80px;
animation:fly 20s linear infinite;
}

@keyframes fly{
0%{left:-100px; top:20%;}
50%{top:10%;}
100%{left:110%; top:30%;}
}

</style>
</head>

<body>

<h1>🚀 Virtual Solar System Explorer</h1>

<div class="solar-system">

<!-- SUN -->
<img class="sun" src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Solar_sys8.jpg">

<!-- ORBITS -->
<div class="orbit mercury-orbit"></div>
<div class="orbit venus-orbit"></div>
<div class="orbit earth-orbit"></div>
<div class="orbit mars-orbit"></div>
<div class="orbit jupiter-orbit"></div>
<div class="orbit saturn-orbit"></div>
<div class="orbit uranus-orbit"></div>
<div class="orbit neptune-orbit"></div>

<!-- PLANETS -->

<div class="planet mercury">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4a/Mercury_in_true_color.jpg" width="20">
<div class="tooltip">Mercury</div>
</div>

<div class="planet venus">
<img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/Venus-real_color.jpg" width="35">
<div class="tooltip">Venus</div>
</div>

<div class="planet earth">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg" width="40">
<div class="tooltip">Earth</div>
</div>

<div class="planet mars">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/02/OSIRIS_Mars_true_color.jpg" width="30">
<div class="tooltip">Mars</div>
</div>

<div class="planet jupiter">
<img src="https://upload.wikimedia.org/wikipedia/commons/e/e2/Jupiter.jpg" width="60">
<div class="tooltip">Jupiter</div>
</div>

<div class="planet saturn">
<img src="https://upload.wikimedia.org/wikipedia/commons/c/c7/Saturn_during_Equinox.jpg" width="60">
<div class="tooltip">Saturn</div>
</div>

<div class="planet uranus">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/3d/Uranus2.jpg" width="40">
<div class="tooltip">Uranus</div>
</div>

<div class="planet neptune">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Neptune_Full.jpg" width="40">
<div class="tooltip">Neptune</div>
</div>

<!-- SPACESHIP -->
<img class="spaceship" src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png">

</div>

</body>
</html>
