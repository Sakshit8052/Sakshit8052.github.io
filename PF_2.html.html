<!DOCTYPE html>
<html>
<head>
<title>CSS Transform Playground</title>

<style>

body{
font-family: Arial;
text-align:center;
background:linear-gradient(120deg,#89f7fe,#66a6ff);
}

h2{
margin-top:20px;
color:#333;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:50px;
}

.box{
width:130px;
height:130px;
color:white;
line-height:130px;
font-size:18px;
border-radius:10px;
transition:5.6s;
cursor:pointer;
}

.translate{
background:#ff6b6b;
}

.translate:hover{
transform: translate(40px,-20px);
}



.rotate{
background:#f7b731;
}

.rotate:hover{
transform: rotate(80deg);
}



.scale{
background:#20bf6b;
}

.scale:hover{
transform: scale(5.4);
}


.skew{
background:#8854d0;
}

.skew:hover{
transform: skew(40deg,70deg);
}


.matrix{
background:#2d98da;
}

.matrix:hover{
transform: matrix(1,1.3,1.5,1,20,20);
}

</style>
</head>

<body>

<h2>CSS Transform Playground</h2>
<p>Hover on each box to see different transform effects</p>

<div class="container">

<div class="box translate">Translate</div>

<div class="box rotate">Rotate</div>

<div class="box scale">Scale</div>

<div class="box skew">Skew</div>

<div class="box matrix">Matrix</div>

</div>

</body>
</html>
