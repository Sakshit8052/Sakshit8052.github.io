
<!DOCTYPE html>
<html>
<head>
    <title>Portfolio</title>
    <style>
.pf-btn {
    background-color: #007bff;
    color: white;
    padding: 18px 35px;  
    margin: 12px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 18px;    
    cursor: pointer;
    transition: 0.3s;
    align:centre;
}

.pf-btn:hover {
    background-color: #0056b3;
    transform: scale(1.08);
}

.image-preview {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 40px;
}

.image-preview img {
    width: 75%;       
    max-width: 800px; 
    height: auto;
    border-radius: 12px;
    box-shadow: 0px 6px 20px rgba(0,0,0,0.3);
}
    .portfolio-buttons {
    display: flex;             
    justify-content: center;  
    align-items: center;       
    flex-wrap: wrap;           
    gap: 15px;               
    margin-top: 30px;
}
        </style>
</head>
<body>

<h2 class="portfolio-title">Our Portfolio</h2>

<div class="portfolio-buttons">
    <button class="pf-btn" onclick="showImage('img1.jpg')">PF 1</button>
    <button class="pf-btn" onclick="showImage('img2.jpg')">PF 2</button>
    <button class="pf-btn" onclick="showImage('img3.jpg')">PF 3</button>
    <button class="pf-btn" onclick="showImage('img4.jpg')">PF 4</button>
    <button class="pf-btn" onclick="showImage('img5.jpg')">PF 5</button>
</div>
    
<div class="image-preview">
    <img id="portfolioImage" src="portfolio_image.jpg" alt="Portfolio Image">
</div>

<script>
function showImage(imageName) {
    document.getElementById("portfolioImage").src = imageName;
}
</script>

</body>

</html>
