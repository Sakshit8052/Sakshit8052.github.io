<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced CSS Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<style>
/* =========================
   CSS WEBSITE LAYOUT
========================= */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

header {
  background: linear-gradient(45deg, #141e30, #243b55);
  color: white;
  text-align: center;
  padding: 2rem;
}

/* NAV */
nav ul {
  display: flex;
  justify-content: center;
  list-style: none;
  padding: 0;
  background: #222;
}

nav a {
  color: white;
  padding: 1rem;
  display: block;
  text-decoration: none;
}

/* =========================
   IMAGE GALLERY
========================= */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1rem;
  padding: 2rem;
}

.card img {
  width: 100%;
  height: calc(200px + 2vw); /* CSS Math Function */
  object-fit: cover;
  transition: transform .3s;
}

.card img:hover {
  transform: scale(1.05);
}

/* =========================
   CSS ATTR SELECTORS
========================= */
input[type="text"],
input[type="email"] {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

/* =========================
   CSS FORMS
========================= */
button {
  background: #243b55;
  color: white;
  padding: 10px;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #141e30;
}

/* =========================
   CSS COUNTERS
========================= */
.gallery {
  counter-reset: image-counter;
}

.card::before {
  counter-increment: image-counter;
  content: "Image " counter(image-counter);
  display: block;
  font-weight: bold;
  margin-bottom: 5px;
}

/* =========================
   CSS IMAGE SPRITES
========================= */
.sprite {
  width: 40px;
  height: 40px;
  background-image: url('images/sprite.png');
  display: inline-block;
}

.icon-facebook { background-position: 0 0; }
.icon-twitter { background-position: -40px 0; }

/* =========================
   CSS UNITS
========================= */
h1 { font-size: 3rem; }
h2 { font-size: 2em; }

/* =========================
   CSS SPECIFICITY
========================= */
nav a {
  color: white;
}

nav ul li a {
  color: yellow; /* Higher specificity */
}

/* =========================
   CSS !important
========================= */
nav a {
  color: red !important;
}

/* =========================
   CSS INHERITANCE
========================= */
footer {
  text-align: center;
  padding: 2rem;
  background: #222;
  color: white;
}
</style>
<header>
  <h1>My Photo Gallery</h1>
</header>

<nav>
  <ul>
    <li><a href="https://sakshit8052.github.io/">Home</a></li>
    <li><a href="galary.html.html">Gallery</a></li>
      <li><a href="https://sakshit8052.github.io/TripathiAirCoolers/index.html">My site</a></li>
    <li><a href="#">Contact</a></li>
  </ul>
</nav>

<section class="gallery">
  <div class="card">
    <img src="nature1.jpg" alt="Nature 1">
  </div>
  <div class="card">
    <img src="nature2.jpg" alt="Nature 2">
  </div>
  <div class="card">
    <img src="nature3.jpg" alt="Nature 3">
  </div>
</section>

<section class="contact">
  <h2>Contact Us</h2>
  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Email Address" required>
    <button type="submit">Submit</button>
  </form>
</section>

<footer>
  <div class="sprite icon-facebook"></div>
  <div class="sprite icon-twitter"></div>
</footer>

</body>
</html>
